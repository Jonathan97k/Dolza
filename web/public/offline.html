<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Dolza Properties</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/images/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="stylesheet" href="css/style.css">
  <script>window.va=window.va||function(){(window.vaq=window.vaq||[]).push(arguments)};</script>
  <script defer src="/_vercel/insights/script.js"></script>
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg-primary); color:var(--text-primary); text-align:center; padding:20px; font-family:'Inter',sans-serif; }
    .offline-card { max-width:400px; }
    .offline-card h1 { font-family:'Playfair Display',serif; color:var(--gold); margin-bottom:16px; font-size:2rem; }
    .offline-card p { color:var(--text-secondary); margin-bottom:30px; line-height:1.7; }
  </style>
</head>
<body>
  <div class="offline-card">
    <h1>You're Offline</h1>
    <p>Check your connection and try again. Some pages may still be available from cache.</p>
    <a href="/" class="btn-primary">Go Home</a>
  </div>
<script>
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); deferredPrompt = e; });
if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
</script>
</body>
</html>
